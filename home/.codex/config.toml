#:schema https://developers.openai.com/codex/config-schema.json

personality = "friendly"
model = "gpt-5.6-sol"
model_reasoning_effort = "medium"
plan_mode_reasoning_effort = "xhigh"

sandbox_mode = "workspace-write"
approval_policy = "on-request"
default_permissions = "workspace_sandbox" # create a custom permissions profile
approvals_reviewer = "auto_review" # set this to "user" to disable auto-review
analytics.enabled = false


notify = ["/Users/akelly/.agents/home/.codex/computer-use/Codex Computer Use.app/Contents/SharedSupport/SkyComputerUseClient.app/Contents/MacOS/SkyComputerUseClient", "turn-ended"]

[permissions.workspace_sandbox.filesystem]
":minimal" = "read" # minimal access required for codex to operate
"~/.agents" = "read" # agent skills and secrets.env
"~/.zprofile" = "read" # commands run via zsh -l, which sources ~/.zprofile and thus ~/.agents/secrets.env
":tmpdir" = "write"     # $TMPDIR, usually /var/folders/.../T on macOS
":slash_tmp" = "write"  # /tmp
"/opt/homebrew" = "read" # allow running brew installed tools
"/Library/Developer/CommandLineTools/usr/bin" = "read" # allow running xcode installed tools
"~/.gitconfig" = "read" # required for git
"~/.config/git" = "read" # required for git
"~/.cache/uv" = "write" # required for uv
"~/.npm/_logs" = "write" # required for npm

[permissions.workspace_sandbox.filesystem.":workspace_roots"]
"." = "read"
"./**" = "write"
".git" = "write"

[permissions.workspace_sandbox.network]
enabled = true
mode = "full"

# Agent-ok keys (~/.agents/secrets.env) flow in from the launching environment.
# Sensitive keys (~/.secrets.env) never reach that environment: the codex()
# launcher in ~/.zshrc scrubs them and ~/.zprofile skips them in agent contexts.
[shell_environment_policy]
inherit = "all"
ignore_default_excludes = true
exclude = ["*_PASSWORD", "AWS_*"]
set = { PATH = "/Users/akelly/.agents/bin:/Users/akelly/.pi/agent/bin:/Users/akelly/.platformio/penv/bin:/Users/akelly/.local/bin:/opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:/System/Cryptexes/App/usr/bin:/usr/bin:/bin:/usr/sbin:/sbin:/var/run/com.apple.security.cryptexd/codex.system/bootstrap/usr/local/bin:/var/run/com.apple.security.cryptexd/codex.system/bootstrap/usr/bin:/var/run/com.apple.security.cryptexd/codex.system/bootstrap/usr/appleinternal/bin:/pkg/env/global/bin:/Library/Apple/usr/bin:/usr/local/MacGPG2/bin:/Applications/iTerm.app/Contents/Resources/utilities:/Applications/Obsidian.app/Contents/MacOS:/Users/akelly/Git/codex-plugin-cc/bin:/Users/akelly/.agents/pi-run/bin" }

[agents]
max_threads = 10

[apps.connector_69a3bc1ded54819199d1684e671e38b9.tools."paper search_search"]
approval_mode = "approve"

[mcp_servers.paper-search]
command = "sh"
args = ["-c", "exec uv run --directory \"$HOME/Git/paper-search-mcp\" paper-search-mcp"]
default_tools_approval_mode = "approve"

[mcp_servers.mcmaster-carr]
command = "sh"
args = ["-c", "exec uv run --directory \"$HOME/Git/mcmaster-agent\" mcmaster-mcp"]
default_tools_approval_mode = "approve"

# Secrets live in ~/.agents/secrets.env (not in git); servers that need one source it via a sh wrapper.
[mcp_servers.parts]
command = "sh"
args = ["-c", ". \"$HOME/.agents/secrets.env\" && exec uvx parts-mcp"]
default_tools_approval_mode = "approve"

[mcp_servers.patents]
command = "sh"
args = ["-c", "exec uv run --directory \"$HOME/Git/patent_mcp_server\" patent-mcp-server"]
default_tools_approval_mode = "approve"
disabled_tools = ["patentsview_search_patents", "patentsview_search_by_ipc", "patentsview_get_patent"]

[mcp_servers.node_repl]
args = []
command = "/Applications/ChatGPT.app/Contents/Resources/cua_node/bin/node_repl"
startup_timeout_sec = 120

[mcp_servers.node_repl.env]
NODE_REPL_NATIVE_PIPE_CONNECT_TIMEOUT_MS = "1000"
NODE_REPL_NODE_MODULE_DIRS = "/Applications/ChatGPT.app/Contents/Resources/cua_node/lib/node_modules"
NODE_REPL_NODE_PATH = "/Applications/ChatGPT.app/Contents/Resources/cua_node/bin/node"
NODE_REPL_TRUSTED_CODE_PATHS = "/Users/akelly/.codex"
CODEX_HOME = "/Users/akelly/.codex"
NODE_REPL_TRUSTED_BROWSER_CLIENT_SHA256S = "6d25aa7656feac858f3a3bdaea5bcbab0dbfd426c9de8e6931ce90c399ee8e4f,e74b67ab909392b37f7aef14977fce7aa80cfa02ade5491f30abcdbcb9e69f33"
BROWSER_USE_AVAILABLE_BACKENDS = "chrome,iab"
NODE_REPL_INSTRUCTIONS_USE_CASE_BROWSER = "Control the in-app browser in conjunction with the Browser Plugin."
NODE_REPL_INSTRUCTIONS_USE_CASE_CHROME = "Control the Chrome browser in conjunction with the Chrome Plugin. Prefer this method of controlling Chrome over alternatives (such as Computer Use) unless the user explicitly mentions an alternative."
NODE_REPL_INSTRUCTIONS_USE_CASE_COMPUTER_USE = "Control desktop apps on macOS through Computer Use."
BROWSER_USE_CODEX_APP_BUILD_FLAVOR = "prod"
BROWSER_USE_CODEX_APP_VERSION = "26.707.51957"
SKY_CUA_SERVICE_PATH = "/Users/akelly/.codex/plugins/cache/openai-bundled/computer-use/1.0.1000387/Codex Computer Use.app"
CODEX_CLI_PATH = "/Applications/ChatGPT.app/Contents/Resources/codex"

[mcp_servers.digikey]
command = "sh"
args = ["-c", "exec uv run --directory \"$HOME/Git/digikey_mcp\" python digikey_mcp_server.py"]
default_tools_approval_mode = "approve"

[mcp_servers.computer-use]
command = "./Codex Computer Use.app/Contents/SharedSupport/SkyComputerUseClient.app/Contents/MacOS/SkyComputerUseClient"
args = ["mcp"]
cwd = "."
enabled = false

[plugins."documents@openai-primary-runtime"]
enabled = true

[plugins."spreadsheets@openai-primary-runtime"]
enabled = true

[plugins."presentations@openai-primary-runtime"]
enabled = true

[plugins."github@openai-curated"]
enabled = true

[plugins."computer-use@openai-bundled"]
enabled = true

[plugins."pdf@openai-primary-runtime"]
enabled = true

[plugins."chrome@openai-bundled"]
enabled = true

[plugins."template-creator@openai-primary-runtime"]
enabled = true

[plugins."sites@openai-bundled"]
enabled = true

[plugins."visualize@openai-bundled"]
enabled = true

[[skills.config]]
path = "/Users/akelly/.codex/skills/codex-primary-runtime/slides/SKILL.md"
enabled = false

[[skills.config]]
path = "/Users/akelly/.codex/skills/codex-primary-runtime/spreadsheets/SKILL.md"
enabled = false

[tui.model_availability_nux]
"gpt-5.5" = 4
"gpt-5.6-sol" = 1

[marketplaces.openai-bundled]
source_type = "local"
source = "/Users/akelly/.codex/.tmp/bundled-marketplaces/openai-bundled"

[marketplaces.openai-primary-runtime]
source_type = "local"
source = "/Users/akelly/.cache/codex-runtimes/codex-primary-runtime/plugins/openai-primary-runtime"

[features]
hooks = true
terminal_resize_reflow = true
goals = true
prevent_idle_sleep = true
js_repl = false

[desktop]
ambient-suggestions-enabled = false
mac-menu-bar-enabled = false
followUpQueueMode = "steer"
localeOverride = "en-US"
preventSleepWhileRunning = true
keepRemoteControlAwakeWhilePluggedIn = true
git-pull-request-merge-method = "squash"
conversationDetailMode = "STEPS_COMMANDS"
dock-icon-preference = "app-default"
show-context-window-usage = true

#[sandbox_workspace_write]
#network_access = true

[desktop.custom_file_handlers.obsidian]
label = "Obsidian"
icon = "/Users/akelly/.codex/obsidian-icon.png"
command = "/usr/bin/open"
args = ["-b", "md.obsidian"]
input = "path"
supports_ssh = false


[[hooks.PreToolUse]]
matcher = "^Bash$"

[[hooks.PreToolUse.hooks]]
type = "command"
command = "/opt/homebrew/bin/uv run /Users/akelly/.agents/hooks/prevent-rm.py"
timeout = 30
statusMessage = "Checking for rm"

[hooks.state]

[hooks.state."/Users/akelly/.codex/config.toml:pre_tool_use:0:0"]
trusted_hash = "sha256:d90234c3206d9293fc153546b3695adee7f6483c58e4fbf606addc065dbc3838"
